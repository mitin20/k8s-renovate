---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordpress
spec:
  selector:
    matchLabels:
      app: wordpress
  replicas: 1
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      containers:
        - name: wordpress
          image: wordpress@sha256:02d0a3a5594dbb81faeac6e2d7978b8b3b8cd583fc208e5b683257314e04e375

          ports:
            - containerPort: 80
